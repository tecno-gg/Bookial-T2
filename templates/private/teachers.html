<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../static/css/common.css">
    <link rel="stylesheet" href="../../static/css/teachers-students.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesores</title>
</head>
<body>
    <header>
        <nav>
            <a href="#">Inicio</a> <!-- Por ahora hasta conseguir un logo @esteban -->

            <a href="#">Nosotros</a>
            <a href="#">Nose</a>
            <a href="#">Lo que sea</a>

            <div>
                <a href="../public/register.html"><button class="glass">Registrarse</button></a>
                <a href="../public/login.html"><button class="glass">Iniciar Sesion</button></a>
            </div>
        </nav>
    </header>
    <main>

        <section class="title">
            <h1>Gestion de profesores</h1>
        </section>

        <section class="events">
            <button commandFor="modal-teacher" command="show-modal" >Nuevo Profesor</button>
        </section>

        <section class="container-grid">

            <article class="header">
                <h1>Profesores</h1>
            </article>

            <article class="teacher-info">
                <h1>JUAN PEREZ</h1>
                <button commandFor="teacherInfo" command="toggle-popover">&uarr;</button>
            
                <div id="teacherInfo" popover>
                    <h1>sdjsd</h1>
                </div>
            </article>
        </section>

        <dialog id="modal-teacher" class="modal">
            <form action="" method="POST">
                <div>
                    <h2>Nuevo Profesor</h2>
                </div>
                
                <fieldset>
                    <label for="new-teacher-name">Nombre: <input type="text" id="new-teacher-name" name="newTeacherName"></label>
                </fieldset>
                <fieldset>
                    <label for="new-rut-teacher">Rut: <input type="text" id="new-rut-teacher" name="newRutTeacher"></label>
                </fieldset>
                <fieldset>
                    <label for="new-subject-teacher">Materia <input type="text" id="new-subject-teacher" name="newSubjectTeacher"></label>
                </fieldset>
                <div class="sbtn">
                    <input type="submit" value="Agregar Profesor" commandFor="modal-teacher" command="close">
                </div>
            </form>
        </dialog>

    </main>
    <footer>
        <p>Bookial &copy;2026 Todos los derechos reservados</p>
        <p>Contacto: bookial@protonmail.com</p>
    </footer>
</body>
</html>
