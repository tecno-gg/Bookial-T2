<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../../static/css/common.css">
	<link rel="stylesheet" href="../../static/css/useraccount.css">
	<title>Register</title>
</head>

<body>

	<header>
		<nav class="glass">
			<a href="index.html">
				<p>Inicio</p>
			</a> <!-- Por ahora hasta conseguir un logo @saray -->

			<a href="#"> <p>Nosotros</p> </a>

			<div>
				<a href="register.html"><button class="glass">Registrarse</button></a>
				<a href="login.html"><button class="glass">Iniciar Sesion</button></a>
			</div>
		</nav>
	</header>

	<main>
		<section class="register-box">
			<h1>Registrarse</h1>
			<form action="" method="FORM_REGISTER">
				<fieldset>
					<legend>Nombres</legend>
					<div>
						<label for="user-name01">Primer nombre:</label>
						<input type="text" id="user-name01" name="name01" placeholder="Cerray" required>
					</div>
					<div>	
						<label for="user-name02">Segundo nombre:</label>
						<input type="text" id="user-name02" name="name02" placeholder="Espeñanza" required>
					</div>
				</fieldset>

				<fieldset>
					<legend>Apellidos</legend>
					<div>
						<label for="user-surname01">Primer apellido:</label>
						<input type="text" id="user-surname01" name="surname01" placeholder="Puntaylillo" required>
					</div>

					<div>
						<label for="user-surname02">Segundo apellido:</label>
						<input type="text" id="user-surname02" name="surname02" placeholder="Montecinos" required>
					</div>
				</fieldset>
				
				<fieldset>
					<legend>Contacto</legend>
					<div>
						<label for="user-email">Email: </label>
						<input type="email" id="user-email" name="email" placeholder="ejemplo@gmail.com" required>
					</div>
					<div>
						<label for="user-password">Contraseña:</label>
						<input type="password" id="user-password" name="password" minlength="6" required>
					</div>
				</fieldset>
				<input type="submit" value="SUBMIT"></input>
			</form>
		</section>

	</main>
	<footer>
		<p>Bookial &copy;2026 Todos los derechos reservados</p>
		<p>Contacto: bookial@protonmail.com</p>
	</footer>
</body>

</html>
